<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta charset="utf-8" />
  <title>Update Status Antrean</title>
  <link rel="stylesheet" href="updateantrean.css">
</head>
<body>
  <div class="app-shell">

    <header class="top-bar">
      <a href="order.html" class="back-btn" aria-label="Kembali">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <span class="top-bar-title">Update Status Antrean</span>
      <div style="width:28px"></div>
    </header>

    <main class="main-scroll">

      <div class="antrean-list">

        <div class="antrean-card">
          <div class="antrean-info">
            <p class="antrean-name">Andi Wijaya</p>
            <p class="antrean-num">Antrean #01</p>
          </div>
          <div class="status-select-wrap" data-status="proses">
            <button class="status-select" onclick="toggleDropdown(this)">
              <span class="status-text">Proses</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="status-menu">
              <div class="status-opt status-opt--tunggu" onclick="setStatus(this, 'tunggu', 'Tunggu')">
                <span class="status-dot status-dot--tunggu"></span> Tunggu
              </div>
              <div class="status-opt status-opt--proses" onclick="setStatus(this, 'proses', 'Proses')">
                <span class="status-dot status-dot--proses"></span> Proses
              </div>
              <div class="status-opt status-opt--selesai" onclick="setStatus(this, 'selesai', 'Selesai')">
                <span class="status-dot status-dot--selesai"></span> Selesai
              </div>
            </div>
          </div>
        </div>

        <div class="antrean-card">
          <div class="antrean-info">
            <p class="antrean-name">Siti Aminah</p>
            <p class="antrean-num">Antrean #02</p>
          </div>
          <div class="status-select-wrap" data-status="tunggu">
            <button class="status-select" onclick="toggleDropdown(this)">
              <span class="status-text">Tunggu</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="status-menu">
              <div class="status-opt status-opt--tunggu" onclick="setStatus(this, 'tunggu', 'Tunggu')">
                <span class="status-dot status-dot--tunggu"></span> Tunggu
              </div>
              <div class="status-opt status-opt--proses" onclick="setStatus(this, 'proses', 'Proses')">
                <span class="status-dot status-dot--proses"></span> Proses
              </div>
              <div class="status-opt status-opt--selesai" onclick="setStatus(this, 'selesai', 'Selesai')">
                <span class="status-dot status-dot--selesai"></span> Selesai
              </div>
            </div>
          </div>
        </div>

        <div class="antrean-card">
          <div class="antrean-info">
            <p class="antrean-name">Budi</p>
            <p class="antrean-num">Antrean #03</p>
          </div>
          <div class="status-select-wrap" data-status="tunggu">
            <button class="status-select" onclick="toggleDropdown(this)">
              <span class="status-text">Tunggu</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="status-menu">
              <div class="status-opt status-opt--tunggu" onclick="setStatus(this, 'tunggu', 'Tunggu')">
                <span class="status-dot status-dot--tunggu"></span> Tunggu
              </div>
              <div class="status-opt status-opt--proses" onclick="setStatus(this, 'proses', 'Proses')">
                <span class="status-dot status-dot--proses"></span> Proses
              </div>
              <div class="status-opt status-opt--selesai" onclick="setStatus(this, 'selesai', 'Selesai')">
                <span class="status-dot status-dot--selesai"></span> Selesai
              </div>
            </div>
          </div>
        </div>

        <div class="antrean-card">
          <div class="antrean-info">
            <p class="antrean-name">Dewi Sartika</p>
            <p class="antrean-num">Antrean #04</p>
          </div>
          <div class="status-select-wrap" data-status="selesai">
            <button class="status-select" onclick="toggleDropdown(this)">
              <span class="status-text">Selesai</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="status-menu">
              <div class="status-opt status-opt--tunggu" onclick="setStatus(this, 'tunggu', 'Tunggu')">
                <span class="status-dot status-dot--tunggu"></span> Tunggu
              </div>
              <div class="status-opt status-opt--proses" onclick="setStatus(this, 'proses', 'Proses')">
                <span class="status-dot status-dot--proses"></span> Proses
              </div>
              <div class="status-opt status-opt--selesai" onclick="setStatus(this, 'selesai', 'Selesai')">
                <span class="status-dot status-dot--selesai"></span> Selesai
              </div>
            </div>
          </div>
        </div>

      </div>

      <div style="height: 80px;"></div>
    </main>

    <nav class="bottom-nav">
      <a href="../Beranda/beranda.html" class="nav-item">
        <div class="nav-pill">
          <img src="../../assets/icon/icon-supplyabu.svg" width="20" height="20" alt="" />
          <span>SUPPLY</span>
        </div>
      </a>
      <a href="order.html" class="nav-item nav-item--active">
        <div class="nav-pill">
          <img src="../../assets/icon/icon-orderputih.svg" width="20" height="20" alt="" />
          <span>ORDER</span>
        </div>
      </a>
      <a href="../FAQ/faq.html" class="nav-item">
        <div class="nav-pill">
          <img src="../../assets/icon/icon-FAQabu.svg" width="20" height="20" alt="" />
          <span>FAQ</span>
        </div>
      </a>
    </nav>
  </div>

  <script src="updateantrean.js"></script>
</body>
</html>
