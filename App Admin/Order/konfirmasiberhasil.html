<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta charset="utf-8" />
  <title>Konfirmasi Berhasil</title>
  <link rel="stylesheet" href="konfirmasiberhasil.css">
</head>
<body>
  <div class="app-shell">

    <header class="top-bar">
      <a href="orderproduk.html" class="back-btn" aria-label="Kembali">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <span class="top-bar-title">Konfirmasi</span>
      <div style="width:28px"></div>
    </header>

    <main class="main-content">
      <div class="success-area">
        <!-- Dekorasi bubble -->
        <div class="bubble bubble--teal"></div>
        <div class="bubble bubble--orange"></div>
        <div class="bubble bubble--teal2"></div>

        <div class="success-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>

      <div class="success-text">
        <h1 class="success-title">Berhasil Dikonfirmasi</h1>
        <p class="success-desc">Produk telah tercatat sebagai terkirim dalam sistem.</p>
      </div>

      <div class="info-row">
        <div class="info-card">
          <p class="info-label">WAKTU</p>
          <p class="info-value" id="waktu-text">--:-- WIB</p>
        </div>
        <div class="info-card">
          <p class="info-label">ID LOG</p>
          <p class="info-value">TRX-99210</p>
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="../Beranda/beranda.html" class="nav-item">
        <div class="nav-pill">
          <img src="../../assets/icon/icon-supplyabu.svg" width="20" height="20" alt="" />
          <span>SUPPLY</span>
        </div>
      </a>
      <a href="order.html" class="nav-item nav-item--active">
        <div class="nav-pill">
          <img src="../../assets/icon/icon-orderputih.svg" width="20" height="20" alt="" />
          <span>ORDER</span>
        </div>
      </a>
      <a href="../FAQ/faq.html" class="nav-item">
        <div class="nav-pill">
          <img src="../../assets/icon/icon-FAQabu.svg" width="20" height="20" alt="" />
          <span>FAQ</span>
        </div>
      </a>
    </nav>

  </div>
  <script>
    // Tampilkan waktu sekarang
    const now = new Date();
    const jam = String(now.getHours()).padStart(2, '0');
    const menit = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('waktu-text').textContent = jam + ':' + menit + ' WIB';
  </script>
</body>
</html>
