<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta charset="utf-8" />
<title>Admin Log In</title>
<link rel="stylesheet" href="login.css">
</head>
<body>
<main class="admin-log-in">
<div class="frame">
<header class="header-top-logo">
<div class="header-top" aria-hidden="true"></div>
<div class="container">
<div class="div">
<img class="image-logo" src="../../assets/images/image-logo.svg" alt="Logo GOAT.k" />
</div>
<div class="div-wrapper">
<div class="text-wrapper">GOAT.k</div>
</div>
</div>
</header>
<section class="main-content-canvas" aria-label="Login administrator">
<div class="right-column-login">
<div class="background">
<div class="div-2" aria-hidden="true"></div>
<div class="role-selection" role="tablist" aria-label="Pilih peran">
<button class="button" id="btn-user" type="button" role="tab" aria-selected="false" tabindex="-1">
<div class="text">User</div>
</button>
<button class="button-2" id="btn-admin" type="button" role="tab" aria-selected="true">
<div class="text-2">Admin</div>
</button>
</div>
<div class="container-2">
<div class="div-3">
<h1 class="portal-administrator">Portal<br/>Administrator</h1>
</div>
<div class="div-3">
<p class="silakan-masuk-dengan">Silakan masuk dengan kredensial<br/>admin Anda untuk mengelola sistem.</p>
</div>
</div>
<form class="form-fields" action="#" method="post">
<div class="container-3">
<label class="email" for="email-input">EMAIL</label>
<div class="container-4">
<div class="input">
<input class="container-5" id="email-input" placeholder="nama@gmail.com" type="email">
</div>
<img class="icon-email" src="../../assets/icon/icon-email.svg" alt="" aria-hidden="true" />
</div>
</div>
<div class="container-6">
<div class="label-wrapper">
<div class="div">
<label class="text-3" for="password-input">PASSWORD</label>
</div>
</div>
<div class="div-3">
<div class="input">
<input class="container-5" id="password-input" placeholder="••••••••" type="password">
</div>
<img class="icon-pw" src="../../assets/icon/icon-pw.svg" alt="" aria-hidden="true" />
</div>
<div class="link-lupa-kata-sandi-wrapper">
<a class="link-lupa-kata-sandi" href="#">Lupa Kata Sandi?</a>
</div>
</div>
<button class="button-3" id="btn-masuk" type="submit">
<div class="div-2" aria-hidden="true"></div>
<div class="text-wrapper-2">Masuk</div>
</button>
</form>
</div>
<footer class="mobile-only-helper">
<div class="element-GOAT-k-hak-wrapper">
<p class="element-GOAT-k-hak">© 2026 GOAT.k.<br/>Hak Cipta Dilindungi.</p>
</div>
</footer>
</div>
</section>
</div>
</main>
<script src="login.js"></script>
</body>
</html>
