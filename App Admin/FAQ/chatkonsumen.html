<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta charset="utf-8" />
  <title>Chat Konsumen</title>
  <link rel="stylesheet" href="chatkonsumen.css">
</head>
<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="chat-top-bar">
      <a href="faq.html" class="back-btn" aria-label="Kembali">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <div class="chat-avatar"></div>
      <div class="chat-header-info">
        <p class="chat-header-name">Joni Iskandar</p>
        <p class="chat-header-status">Online</p>
      </div>
      <button class="more-btn" aria-label="Opsi lainnya">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
        </svg>
      </button>
    </header>

    <!-- Chat messages -->
    <main class="chat-main" id="chat-main">

      <div class="msg-row msg-row--in">
        <div class="bubble bubble--in">
          Halo admin, pesanan saya #ORD-99210 kapan dikirim ya?
        </div>
        <p class="msg-time">09:41 AM</p>
      </div>

      <div class="msg-row msg-row--out">
        <div class="bubble bubble--out">
          Halo Bapak Joni, pesanan Anda sedang dalam proses pengemasan dan akan dikirim sore ini.
        </div>
        <p class="msg-time msg-time--out">09:42 AM <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline; vertical-align:middle;"><polyline points="20 6 9 17 4 12"/></svg></p>
      </div>

      <div class="msg-row msg-row--in">
        <div class="bubble bubble--in">
          Baik, terima kasih atas informasinya min.
        </div>
        <p class="msg-time">09:43 AM</p>
      </div>

    </main>

    <!-- Input bar -->
    <div class="chat-input-bar">
      <button class="attach-btn" aria-label="Lampirkan file">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input type="text" class="chat-input" id="chat-input" placeholder="Tulis pesan..." />
      <button class="send-btn" id="send-btn" aria-label="Kirim">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>

  </div>
  <script src="chatkonsumen.js"></script>
</body>
</html>
